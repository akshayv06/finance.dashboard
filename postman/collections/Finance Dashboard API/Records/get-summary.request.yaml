$kind: http-request
name: Get Summary
order: 4000
method: GET
url: '{{baseUrl}}/api/records/summary'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 2xx", function () {
          pm.response.to.be.success;
      });
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test("Response has summary fields", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property("totalIncome");
          pm.expect(json).to.have.property("totalExpense");
          pm.expect(json).to.have.property("netBalance");
      });
