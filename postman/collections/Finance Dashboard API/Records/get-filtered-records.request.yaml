$kind: http-request
name: Get Filtered Records
order: 8000
method: GET
url: "{{baseUrl}}/api/records/filter?startDate=2025-01-01&endDate=2025-12-31&pa\
  ge=0&size=5"
queryParams:
  - key: startDate
    value: 2025-01-01
    description: "Filter start date (ISO format: YYYY-MM-DD)"
  - key: endDate
    value: 2025-12-31
    description: "Filter end date (ISO format: YYYY-MM-DD)"
  - key: page
    value: "0"
    description: "Page number (0-indexed, default: 0)"
  - key: size
    value: "5"
    description: "Page size (default: 5)"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 2xx", function () {
          pm.response.to.be.success;
      });
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test("Response has paginated structure", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property("content");
          pm.expect(json).to.have.property("totalElements");
          pm.expect(json).to.have.property("totalPages");
          pm.expect(json.content).to.be.an("array");
      });
    language: text/javascript
